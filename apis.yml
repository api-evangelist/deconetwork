aid: deconetwork
url: https://raw.githubusercontent.com/api-evangelist/deconetwork/refs/heads/main/apis.yml
name: DecoNetwork
kind: company
description: >-
  DecoNetwork is web-to-print and business-management software for custom
  apparel decorators and print shops - screen printing, embroidery,
  direct-to-garment, and promotional products - combining branded online
  stores, quoting, order and artwork management, purchasing, inventory, and
  production workflow in one platform. For Enterprise subscribers DecoNetwork
  exposes a documented public JSON API over HTTPS to search and update orders,
  manage products, manage inventory, and manage purchase orders, letting shops
  integrate DecoNetwork with external carts, ERP/CRM systems, and custom
  production automation. Each request is authenticated with account username
  and password fields; the API is request/response REST returning JSON, and API
  access is included only on the Enterprise plan.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Custom Apparel
- Web to Print
- Print Shop Management
- Orders
- Products
- Inventory
- Production Workflow
- E-commerce
