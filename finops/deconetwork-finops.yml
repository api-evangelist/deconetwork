meters:
- name: plan_subscription
  description: Fixed monthly DecoNetwork plan subscription (Standard, Premium, or Enterprise).
  unit: months
  aggregation: sum
  dimensions:
  - account
  - plan
- name: license_fee
  description: One-time license fee charged at signup, varying by plan.
  unit: fee
  aggregation: sum
  dimensions:
  - account
  - plan
- name: integration_engineering
  description: Internal engineering effort to build and maintain integrations against the DecoNetwork JSON API (no vendor invoice).
  unit: hours
  aggregation: sum
  dimensions:
  - team
principles:
- name: Visibility
  description: Track the monthly plan subscription and the one-time license fee as the primary DecoNetwork costs; API access adds no metered charge.
- name: Allocation
  description: Attribute the Enterprise subscription to the operations/fulfillment function that depends on API-driven automation.
- name: Optimization
  description: Only step up to the Enterprise tier when integration and automation value (ERP/CRM sync, custom production workflows) exceeds the incremental subscription cost.
- name: Accountability
  description: Assign an owner for the DecoNetwork subscription and for each integration built on the JSON API.
