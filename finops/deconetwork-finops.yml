description: >-
  FinOps view of DecoNetwork spend. DecoNetwork is a fixed monthly SaaS
  subscription with a one-time license fee at signup, not a usage-metered API.
  The dominant, predictable cost is the plan subscription (Standard, Premium, or
  Enterprise). API access is a capability bundled into the Enterprise plan
  rather than a separately billed line item, so there is no per-call API charge
  to allocate - the relevant FinOps decision is whether the workflow automation
  and integrations enabled by the API justify the step up to the Enterprise
  tier.
notes: >-
  API usage carries no incremental metered fee; the cost driver is the
  Enterprise subscription plus the one-time license fee. Verify current rates on
  the DecoNetwork pricing page. Secondary internal costs are the engineering
  effort to build and maintain integrations against the JSON API.
